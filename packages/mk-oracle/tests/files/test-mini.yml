---
oracle:
  main: # mandatory, to be used if no specific config
    options:
      _use_host_client: /usr/lib/oracle/21/client64/lib # you may use it to correctly set path to custom client
    connection: # mandatory
      hostname: oracle-rocky-ci.lan.checkmk.net
      port: 1521
      service_name: dbtest23
    authentication: # mandatory
      username: system
      password: $CI_ORA_TEST_PASSWORD
      type: standard
#      role: sysdba # it may be not enabled by Oracle DBA
#    sections: # optional, if absent will use default as defined below
#      - instance: # special section
